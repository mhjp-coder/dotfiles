#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor = DP-1, 2560x1440@144, 0x0, 1
monitor = DP-2, 2560x1440, 2560x0, 1
#monitor=,highres,auto,1
workspace = 1,3,5,7,9, monitor:DP-1
workspace = 2,4,6,8,0, monitor:DP-2

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
exec-once = dunst & udiskie & hyprpaper & avizo-service &

# Clipboard
exec-once = wl-paste -p --watch wl-copy -pc && wl-paste --watch cliphist store
exec-once = wl-paste --type text --watch cliphist store #Stores only text data
exec-once = wl-paste --type image --watch cliphist store #Stores only image data
# Polkit
exec-once = /usr/lib/polkit-kde-authentication-agent-1
# Swayidle
exec-once = swayidle -w timeout 1800 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on' timeout 5400 'systemctl suspend' before-sleep 'swaylock -f -c 000000' &
# Waybar
exec-once = waybar &

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Some default env vars.
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_QPA_PLATFORM,wayland-egl
env = GTK_USE_PORTAL,1
env = SSL_CERT_FILE,/etc/ssl/certs/ca-certificates.crt
#env = GDK_BACKEND,"wayland,x11"

exec-once = dbus-update-activation-environment --systemd --all

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = false
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

# dracula/hyprland
general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    gaps_in = 5
    gaps_out = 20

    border_size = 2
    col.inactive_border	= rgba(44475aaa)
    col.active_border = rgb(bd93f9) rgb(44475a) 45deg
    col.nogroup_border = rgba(44475aaa)
    col.nogroup_border_active = rgb(bd93f9) rgb(44475a) 45deg

    layout = master

}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    rounding = 10
    blur {
        enabled = true
        size = 3
        passes = 1
    }
    drop_shadow = true
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1E202966)
}

group {
    # Dracula
    col.border_active = rgb(bd93f9) rgb(44475a) 45deg
    col.border_inactive = rgba(44475aaa)
    col.border_locked_active = rgb(44475a) rgb(bd93f9) 45deg
    col.border_locked_inactive = rgba(282a36dd)

    # darker alternative
    #col.border_active = rgb(44475a) # or rgb(6272a4)
    #col.border_inactive = rgb(282a36)
    #col.border_locked_active = rgb(44475a) # or rgb(6272a4)
    #col.border_locked_inactive = rgb(282a36)

}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = true # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_is_master = true
    mfact = 0.75
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = false
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
device:epic-mouse-v1 {
    sensitivity = -0.5
}

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more


# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, alacritty
bind = $mainMod, B, exec, firefox
bind = $mainMod, M, exec, cider
bind = $mainMod, F, exec, dolphin
bind = $mainMod, D, exec, discord
bind = $mainMod, K, exec, code
bind = $mainMod, SPACE, exec, wofi -i --show drun --allow-images --no-actions
bind = $mainMod, S, exec, grim -g "$(slurp)" "Pictures/Screenshots/$(date '+%y%m%d_%H-%M-%S').png"
bind = $mainMod, C, exec, cliphist list | wofi -dmenu | cliphist decode | wl-copy

# Window Management
bind = $mainMod SHIFT, F, fullscreen
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, Q, killactive,

# Lock, Suspend, Quit, etc.
bind = $mainMod SHIFT, Q, exit,
bind = $mainMod SHIFT, L, exec, wlogout
bind = $mainMod SHIFT, S, exec, systemctl suspend
bind = $mainMod SHIFT, H, exec, systemctl hibernate

# Media Keys
#bind=, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
#bind=, XF86AudioLowerVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%-
#bind=, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=, XF86AudioRaiseVolume, exec, volumectl -u up
bind=, XF86AudioLowerVolume, exec, volumectl -u down
bind=, XF86AudioMute, exec, volumectl toggle-mute
bind=, XF86AudioPlay, exec, curl http://localhost:9000/api/playback/playpause
bind=, XF86AudioPrev, exec, curl http://localhost:9000/api/playback/previous
bind=, XF86AudioNext, exec, curl http://localhost:9000/api/playback/next
bind=, XF86AudioStop, exec, curl http://localhost:9000/api/playback/stop


# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Cycle master position window
bind = $mainMod, TAB, swapnext,
#bind = $mainMod, right, swapwindow, r
#bind = $mainMod, up, swapwindow, u
#bind = $mainMod, down, swapwindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Start Applications on assigned workspaces.
#exec-once = ./start.sh
