general {
  grace = 1
  hide_cursor = true
  ignore_empty_input = true
}

background {
    monitor =
    path = ~/Pictures/Wallpapers/lockscreen.png   # only png supported for now
    color = rgba(66, 71, 96, 1.0)

}

input-field {
    monitor = DP-1
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.33 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.15 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = false
    dots_rounding = -1 # -1 default circle, -2 follow input-field rounding
    outer_color = rgb(40, 42, 58)
    inner_color = rgb(154, 157, 172)
    font_color = rgb(248, 248, 242)
    font_family = Noto Sans
    fade_on_empty = true
    fade_timeout = 3000 # Milliseconds before fade_on_empty is triggered.
    placeholder_text = <i>Input Password...</i> # Text rendered in the input box when it's empty.
    hide_input = false
    rounding = -1 # -1 means complete rounding (circle/oval)
    check_color = rgb(201, 140, 255)
    fail_color = rgb(255, 66, 66) # if authentication failed, changes outer_color and fail message color
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i> # can be set to empty
    fail_transition = 200 # transition time in ms between normal outer_color and fail_color
    capslock_color = rgb(255, 180, 62)
    numlock_color = -1
    bothlock_color = -1 # when both locks are active. -1 means don't change outer color (same for above)
    invert_numlock = false # change color if numlock is off
    swap_font_color = false # see below

    position = 0, -500
    halign = center
    valign = center
}
